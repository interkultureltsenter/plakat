<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interkulturelt Senter Sogndal</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #e8e4df; min-height: 100vh; }

.container { max-width: 560px; margin: 0 auto; padding: 24px 16px 40px; }

.header { text-align: center; background: #1a2744; color: white; padding: 22px 16px; border-radius: 14px; margin-bottom: 18px; }
.header .motto { font-style: italic; font-size: 12px; color: #aab4cc; margin-bottom: 6px; }
.header h1 { font-size: 23px; font-weight: 900; letter-spacing: 2px; }
.header h1 span { color: #e57368; }

.lang-intro { font-size: 13px; color: #555; text-align: center; margin-bottom: 18px; }

.lang-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
.lang-tile { background: white; border: 2px solid #ddd; border-radius: 12px; padding: 14px 8px; text-align: center; cursor: pointer; transition: all 0.15s ease; }
.lang-tile:hover, .lang-tile:active { border-color: #C0392B; background: #fff5f5; transform: translateY(-1px); }
.lang-tile .flag { font-size: 28px; display: block; margin-bottom: 6px; }
.lang-tile .name { font-size: 14.5px; font-weight: 700; color: #1a2744; line-height: 1.25; }

#poster-view { display: none; }
#poster-view.visible { display: block; }

.poster-img-wrap { max-width: 100%; margin: 0 auto; }
.poster-img-wrap img { width: 100%; display: block; border-radius: 6px; box-shadow: 0 6px 24px rgba(0,0,0,0.18); }

.actions { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin: 18px 0 8px; }
.action-btn { flex: 1 1 140px; max-width: 220px; text-align: center; padding: 13px 14px; border-radius: 10px; font-weight: 700; text-decoration: none; font-size: 14px; color: white; }
.action-btn .ico { margin-right: 6px; }
.action-btn.fb { background: #1877F2; }
.action-btn.ms { background: #0084FF; }
.action-btn.em { background: #1a2744; }

.back-btn { display: block; text-align: center; padding: 14px; font-size: 13px; color: #777; cursor: pointer; text-decoration: underline; margin-top: 6px; }
</style>
</head>
<body>

<div class="container">

  <div id="lang-page">
    <div class="header">
      <div class="motto">verdens vidde under den norske himmelen</div>
      <h1>INTERKULTURELT <span>Senter</span></h1>
    </div>
    <p class="lang-intro">Vel språk / Choose your language / اختر لغتك / Wybierz język</p>
    <div class="lang-grid" id="lang-grid"></div>
  </div>

  <div id="poster-view">
    <span class="back-btn" onclick="goBack()">← Vel språk / Choose language</span>
    <div class="poster-img-wrap">
      <img id="poster-img" src="" alt="Plakat">
    </div>
    <div class="actions">
      <a class="action-btn fb" href="https://www.facebook.com/InterkultureltSenter" target="_blank" rel="noopener"><span class="ico">📘</span>Facebook</a>
      <a class="action-btn ms" href="https://m.me/InterkultureltSenter" target="_blank" rel="noopener"><span class="ico">💬</span>Messenger</a>
      <a class="action-btn em" href="mailto:interkultureltsenter@gmail.com"><span class="ico">✉️</span>Email</a>
    </div>
    <span class="back-btn" onclick="goBack()">← Vel språk / Choose language</span>
  </div>

</div>

<script>
const langs = {
  no:  { name: "Norsk",        flag: "🇳🇴" },
  pl:  { name: "Polski",       flag: "🇵🇱" },
  uk:  { name: "Українська",   flag: "🇺🇦" },
  en:  { name: "English",      flag: "🇬🇧" },
  ar:  { name: "العربية",      flag: "🇸🇦" },
  so:  { name: "Soomaali",     flag: "🇸🇴" },
  ti:  { name: "ትግርኛ",        flag: "🇪🇷" },
  am:  { name: "አማርኛ",        flag: "🇪🇹" },
  fa:  { name: "فارسی",        flag: "🇮🇷" },
  ps:  { name: "پښتو",         flag: "🇦🇫" },
  de:  { name: "Deutsch",      flag: "🇩🇪" },
  fr:  { name: "Français",     flag: "🇫🇷" },
  es:  { name: "Español",      flag: "🇪🇸" },
  pt:  { name: "Português",    flag: "🇵🇹" },
  ro:  { name: "Română",       flag: "🇷🇴" },
  sr:  { name: "Српски",       flag: "🇷🇸" },
  hr:  { name: "Hrvatski",     flag: "🇭🇷" },
  sk:  { name: "Slovenčina",   flag: "🇸🇰" },
  lt:  { name: "Lietuvių",     flag: "🇱🇹" },
  lv:  { name: "Latviešu",     flag: "🇱🇻" },
  fil: { name: "Filipino",     flag: "🇵🇭" },
  th:  { name: "ภาษาไทย",      flag: "🇹🇭" },
  zh:  { name: "中文",         flag: "🇨🇳" },
  ja:  { name: "日本語",        flag: "🇯🇵" },
  bn:  { name: "বাংলা",        flag: "🇧🇩" },
  ln:  { name: "Lingala",      flag: "🇨🇩" },
  cs:  { name: "Čeština",      flag: "🇨🇿" }
};

const grid = document.getElementById('lang-grid');
Object.keys(langs).forEach(code => {
  const l = langs[code];
  const btn = document.createElement('div');
  btn.className = 'lang-tile';
  btn.onclick = () => showLang(code);
  btn.innerHTML = `<span class="flag">${l.flag}</span><span class="name">${l.name}</span>`;
  grid.appendChild(btn);
});

function showLang(code) {
  const l = langs[code];
  if (!l) return;
  document.getElementById('poster-img').src = `plakaty/${code}.png`;
  document.getElementById('poster-img').alt = l.name;
  document.getElementById('lang-page').style.display = 'none';
  document.getElementById('poster-view').classList.add('visible');
  window.scrollTo(0, 0);
}

function goBack() {
  document.getElementById('lang-page').style.display = 'block';
  document.getElementById('poster-view').classList.remove('visible');
  window.scrollTo(0, 0);
}
</script>
</body>
</html>
