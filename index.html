function showLang(code) {
  const l = langs[code];
  if (!l) return;

  document.querySelectorAll('.flag-btn').forEach(b => b.classList.remove('active'));
  event.currentTarget.classList.add('active');

  document.getElementById('header-motto').textContent = l.motto;
  document.getElementById('content-motto').textContent = l.motto;
  document.getElementById('bli-med').textContent = l.bli;
  document.getElementById('join-line').textContent = l.join || '';
  document.getElementById('felles').textContent = l.felles;
  document.getElementById('main-text').textContent = l.text;
  document.getElementById('contact-title').textContent = l.contact;

  const card = document.getElementById('lang-display');
  card.classList.add('visible');

  const dir = l.rtl ? 'rtl' : 'ltr';
  card.style.direction = dir;
  document.getElementById('content-motto').style.direction = dir;
  document.getElementById('main-text').style.direction = dir;

  card.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>
